<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO Best Practices -->
    <title>{{.Title}}</title>
    <meta name="description" content="ShakhaNow is a modern web application built with Go Fiber and Tailwind CSS.">
    <!-- Include Tailwind compiled CSS -->
    <link rel="stylesheet" href="/public/style.css">
</head>
<body class="bg-slate-900 min-h-screen text-slate-100 font-sans antialiased flex flex-col items-center justify-center p-4">
    <!-- Background styling with premium glassmorphism -->
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[50%] -left-[10%] w-[70%] h-[70%] rounded-full bg-blue-600/20 blur-[120px]"></div>
        <div class="absolute top-[20%] -right-[10%] w-[50%] h-[50%] rounded-full bg-indigo-600/20 blur-[100px]"></div>
    </div>

    <!-- Main Content Container with Glass UI -->
    <main class="relative z-10 bg-slate-800/60 backdrop-blur-xl border border-slate-700/50 p-10 md:p-16 rounded-3xl shadow-2xl max-w-3xl w-full text-center transition-all duration-300 hover:shadow-indigo-500/10 hover:border-slate-600/50">
        
        <!-- Header -->
        <div class="mb-10">
            <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight mb-4 bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent transform transition hover:scale-105 duration-300">
                Welcome to {{.Title}}
            </h1>
            <p class="text-lg md:text-xl text-slate-400 font-medium">
                Go Fiber v2 + Tailwind CSS + Docker + Air Hot Reload 🚀
            </p>
        </div>

        <!-- Interactive Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
            <div class="bg-slate-800/80 p-6 rounded-2xl border border-slate-700 hover:bg-slate-700/80 hover:-translate-y-1 transition-all duration-300 cursor-pointer group">
                <div class="h-12 w-12 rounded-xl bg-blue-500/20 text-blue-400 flex items-center justify-center mb-4 group-hover:scale-110 transition shrink-0 mx-auto">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <h3 class="text-xl font-bold text-slate-200 mb-2">Blazing Fast</h3>
                <p class="text-slate-400 text-sm">Experience the raw performance of Go Fiber paired with hot-reloading powered by Air.</p>
            </div>
            
            <div class="bg-slate-800/80 p-6 rounded-2xl border border-slate-700 hover:bg-slate-700/80 hover:-translate-y-1 transition-all duration-300 cursor-pointer group">
                <div class="h-12 w-12 rounded-xl bg-indigo-500/20 text-indigo-400 flex items-center justify-center mb-4 group-hover:scale-110 transition shrink-0 mx-auto">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <h3 class="text-xl font-bold text-slate-200 mb-2">Beautiful Scss</h3>
                <p class="text-slate-400 text-sm">Style your components seamlessly with Tailwind CSS and premium glassmorphism layouts.</p>
            </div>
        </div>

        <!-- Call to Action -->
        <div class="mt-12">
            <button class="px-8 py-3 rounded-full bg-gradient-to-r from-blue-600 to-indigo-600 font-semibold text-white shadow-lg shadow-blue-500/30 hover:shadow-blue-500/50 hover:scale-105 active:scale-95 transition-all duration-200">
                Get Started
            </button>
        </div>
    </main>
</body>
</html>
