version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    environment:
      - CGO_ENABLED=0
    # Wait until dependencies are downloaded before running
    command: >
      sh -c "go mod tidy && air -c .air.toml"
    restart: unless-stopped

  tailwind:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - CHOKIDAR_USEPOLLING=true
    # Install dependencies and start the Tailwind file watcher
    command: sh -c "npm install && npx tailwindcss -i ./styles/input.css -o ./public/style.css --watch"
    restart: unless-stopped
